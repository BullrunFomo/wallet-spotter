<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Wallet Spotter — Top Traders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #121212;
      --panel: #1A1A1A;
      --panel-2: #0A0A0A;
      --border: #262626;
      --text: #F5F5F5;
      --muted: #8A8A8A;
      --accent: #D97757;
      --accent-hover: #C96846;
      --buy: #8FB573;
      --sell: #D77B6D;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: 'Söhne', ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 48px 20px 120px;
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: -0.005em;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 6px;
    }
    h1 {
      margin: 0;
      font-family: 'Tiempos Headline', 'Copernicus', ui-serif, Georgia, serif;
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -0.025em;
      color: var(--text);
    }
    h1 em {
      font-style: italic;
      color: var(--accent);
      font-weight: 400;
    }
    .sub { color: var(--muted); margin-bottom: 28px; font-size: 14px; }
    .nav { display: flex; gap: 22px; font-size: 13px; flex-shrink: 0; }
    .nav a { color: var(--muted); text-decoration: none; padding-bottom: 4px; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
    .nav a:hover { color: var(--text); }
    .nav a.active { color: var(--accent); border-bottom-color: var(--accent); }
    form {
      display: flex;
      align-items: stretch;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 24px;
      overflow: hidden;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    form:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(217, 119, 87, 0.15);
    }
    .input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      padding-left: 16px;
      gap: 10px;
    }
    .input-wrap svg { flex-shrink: 0; color: var(--muted); }
    input {
      flex: 1;
      padding: 14px 14px 14px 0;
      background: transparent;
      color: var(--text);
      border: none;
      font-size: 14px;
      font-family: inherit;
      min-width: 0;
    }
    input::placeholder { color: var(--muted); }
    input:focus { outline: none; }
    button {
      padding: 0 24px;
      background: var(--accent);
      color: #0A0A0A;
      border: none;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background-color 0.15s ease;
      margin: 6px;
      border-radius: 8px;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 13.5px;
    }
    th {
      background: var(--panel-2);
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    tbody tr { transition: background-color 0.12s ease; }
    tbody tr:hover { background: rgba(217, 119, 87, 0.04); }
    tr:last-child td { border-bottom: none; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .wallet { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 12.5px; }
    .wallet a { color: var(--accent); text-decoration: none; }
    .wallet a:hover { text-decoration: underline; }
    .copy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      width: 20px;
      height: 20px;
      margin-left: 6px;
      padding: 0;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s ease, border-color 0.15s ease, background-color 0.15s ease, transform 0.1s ease;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(217, 119, 87, 0.08); }
    .copy-btn:active { transform: scale(0.94); }
    .copy-btn.copied { color: var(--buy); border-color: var(--buy); background: rgba(143, 181, 115, 0.1); }
    .copy-btn svg { width: 11px; height: 11px; pointer-events: none; }
    .buy { color: var(--buy); }
    .sell { color: var(--sell); }
    .status { color: var(--muted); padding: 24px; text-align: center; font-size: 14px; }
    .error {
      color: var(--sell);
      background: rgba(215, 123, 109, 0.08);
      border: 1px solid rgba(215, 123, 109, 0.3);
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
    }
    @media (max-width: 720px) {
      body { padding: 24px 16px 80px; font-size: 14px; }
      .header { flex-direction: column; align-items: flex-start; gap: 14px; margin-bottom: 4px; }
      h1 { font-size: 30px; }
      .sub { margin-bottom: 20px; font-size: 13px; }
      .nav { gap: 18px; font-size: 13px; width: 100%; }
      form { border-radius: 14px; margin-bottom: 18px; }
      .input-wrap { padding-left: 14px; }
      input { padding: 13px 12px 13px 0; font-size: 16px; }
      button { padding: 12px 18px; margin: 5px; border-radius: 10px; font-size: 14px; }

      table, thead, tbody, tr, td { display: block; width: 100%; }
      table { background: transparent; border: none; border-radius: 0; overflow: visible; }
      thead { position: absolute; left: -9999px; }
      tbody tr {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 10px;
        position: relative;
      }
      tbody tr:hover { background: var(--panel); }
      tbody td {
        border: none;
        padding: 5px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        font-size: 13.5px;
      }
      tbody td.num { text-align: right; }
      tbody td::before {
        content: attr(data-label);
        color: var(--muted);
        text-transform: uppercase;
        font-size: 10.5px;
        letter-spacing: 0.08em;
        font-weight: 500;
        flex-shrink: 0;
      }
      tbody td.rank {
        position: absolute;
        top: 14px;
        right: 16px;
        padding: 2px 8px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 11px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        display: inline-block;
        width: auto;
      }
      tbody td.rank::before { content: '#'; margin-right: 1px; }
      tbody td.wallet {
        display: block;
        padding: 0 60px 10px 0;
        margin-bottom: 6px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
      }
      tbody td.wallet::before { display: none; }
      tbody td.wallet a { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Wallet <em>Spotter</em></h1>
      <nav class="nav">
        <a href="/" class="active">Token scanner</a>
        <a href="/history.html">History</a>
        <a href="/leaderboard.html">Leaderboard</a>
      </nav>
    </div>
    <div class="sub">Top traders for a Solana token</div>

    <form id="form">
      <label class="input-wrap" for="address">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="address" name="address" placeholder="Paste a Solana token contract address" required autocomplete="off" spellcheck="false" />
      </label>
      <button id="submit" type="submit">Look up</button>
    </form>

    <div id="results"></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const submitBtn = document.getElementById('submit');
    const results = document.getElementById('results');

    const fmtNum = (n) => {
      if (n === null || n === undefined || isNaN(n)) return '—';
      const x = Number(n);
      if (Math.abs(x) >= 1e9) return (x / 1e9).toFixed(2) + 'B';
      if (Math.abs(x) >= 1e6) return (x / 1e6).toFixed(2) + 'M';
      if (Math.abs(x) >= 1e3) return (x / 1e3).toFixed(2) + 'K';
      return x.toFixed(2);
    };
    const fmtUsd = (n) => '$' + fmtNum(n);
    const shortAddr = (a) => (a ? a.slice(0, 4) + '…' + a.slice(-4) : '');

    const COPY_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
    const CHECK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>';
    const copyBtn = (addr) => `<button type="button" class="copy-btn" data-copy="${addr}" title="Copy address" aria-label="Copy address">${COPY_ICON}</button>`;
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.copy-btn');
      if (!btn) return;
      e.preventDefault();
      const addr = btn.getAttribute('data-copy');
      if (!addr) return;
      navigator.clipboard.writeText(addr).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = CHECK_ICON;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = COPY_ICON;
        }, 1200);
      }).catch(() => {});
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const params = new URLSearchParams({
        address: document.getElementById('address').value.trim(),
      });

      results.innerHTML = '<div class="status">Loading…</div>';
      submitBtn.disabled = true;

      try {
        const r = await fetch('/api/top-traders?' + params.toString());
        const data = await r.json();
        if (!r.ok || data.error) {
          results.innerHTML = '<div class="error">' + (data.error || data.message || 'Request failed') + '</div>';
          return;
        }
        const items = (data.items || []).slice();
        if (!items.length) {
          results.innerHTML = '<div class="status">No traders returned.</div>';
          return;
        }
        items.sort((a, b) => {
          const pnlA = a.realizedPnl != null ? a.realizedPnl : Number(a.volumeSellUsd || 0) - Number(a.volumeBuyUsd || 0);
          const pnlB = b.realizedPnl != null ? b.realizedPnl : Number(b.volumeSellUsd || 0) - Number(b.volumeBuyUsd || 0);
          return pnlB - pnlA;
        });
        const rows = items.map((t, i) => {
          const addr = t.owner || '';
          const pnl = t.realizedPnl != null ? Number(t.realizedPnl) : (Number(t.volumeSellUsd || 0) - Number(t.volumeBuyUsd || 0));
          const pnlClass = pnl >= 0 ? 'buy' : 'sell';
          const pnlSign = pnl >= 0 ? '+' : '-';
          return `
            <tr>
              <td class="rank">${i + 1}</td>
              <td class="wallet"><a href="https://solscan.io/account/${addr}" target="_blank" rel="noopener">${shortAddr(addr)}</a>${copyBtn(addr)}</td>
              <td class="num" data-label="Buy">${fmtNum(t.volumeBuy)}</td>
              <td class="num" data-label="Sell">${fmtNum(t.volumeSell)}</td>
              <td class="num buy" data-label="Buy $">${fmtUsd(t.volumeBuyUsd)}</td>
              <td class="num sell" data-label="Sell $">${fmtUsd(t.volumeSellUsd)}</td>
              <td class="num" data-label="Entry MC">${t.entryMcap ? fmtUsd(t.entryMcap) : '—'}</td>
              <td class="num" data-label="Exit MC">${t.exitMcap ? fmtUsd(t.exitMcap) : '—'}</td>
              <td class="num ${pnlClass}" data-label="PNL">${pnlSign}${fmtUsd(Math.abs(pnl))}</td>
            </tr>`;
        }).join('');
        results.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>#</th><th>Wallet</th>
                <th style="text-align:right">Buy</th>
                <th style="text-align:right">Sell</th>
                <th style="text-align:right">Buy $</th>
                <th style="text-align:right">Sell $</th>
                <th style="text-align:right">Entry MC</th>
                <th style="text-align:right">Exit MC</th>
                <th style="text-align:right">PNL</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      } catch (err) {
        results.innerHTML = '<div class="error">' + String(err) + '</div>';
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
