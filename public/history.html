<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Wallet Spotter — Scan History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #121212;
      --panel: #1A1A1A;
      --panel-2: #0A0A0A;
      --border: #262626;
      --text: #F5F5F5;
      --muted: #8A8A8A;
      --accent: #D97757;
      --accent-hover: #C96846;
      --buy: #8FB573;
      --sell: #D77B6D;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: 'Söhne', ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 48px 20px 120px;
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: -0.005em;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 6px;
    }
    h1 {
      margin: 0;
      font-family: 'Tiempos Headline', 'Copernicus', ui-serif, Georgia, serif;
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -0.025em;
      color: var(--text);
    }
    h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
    .sub { color: var(--muted); margin-bottom: 28px; font-size: 14px; }
    .nav { display: flex; gap: 22px; font-size: 13px; flex-shrink: 0; }
    .nav a { color: var(--muted); text-decoration: none; padding-bottom: 4px; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
    .nav a:hover { color: var(--text); }
    .nav a.active { color: var(--accent); border-bottom-color: var(--accent); }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 13.5px;
    }
    th {
      background: var(--panel-2);
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    tbody tr { transition: background-color 0.12s ease; }
    tbody tr:hover { background: rgba(217, 119, 87, 0.04); }
    tr:last-child td { border-bottom: none; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .addr { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 12.5px; }
    .addr a { color: var(--accent); text-decoration: none; }
    .addr a:hover { text-decoration: underline; }
    .buy { color: var(--buy); }
    .sell { color: var(--sell); }
    .status { color: var(--muted); padding: 24px; text-align: center; font-size: 14px; }
    .error { color: var(--sell); background: rgba(215, 123, 109, 0.08); border: 1px solid rgba(215, 123, 109, 0.3); padding: 14px 16px; border-radius: 10px; font-size: 14px; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 12px; }
    @media (max-width: 720px) {
      body { padding: 24px 16px 80px; font-size: 14px; }
      .header { flex-direction: column; align-items: flex-start; gap: 14px; margin-bottom: 4px; }
      h1 { font-size: 30px; }
      .sub { margin-bottom: 20px; font-size: 13px; }
      .nav { gap: 18px; font-size: 13px; width: 100%; }

      table, thead, tbody, tr, td { display: block; width: 100%; }
      table { background: transparent; border: none; border-radius: 0; overflow: visible; }
      thead { position: absolute; left: -9999px; }
      tbody tr {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 10px;
        position: relative;
      }
      tbody tr:hover { background: var(--panel); }
      tbody td {
        border: none;
        padding: 5px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        font-size: 13.5px;
      }
      tbody td.num { text-align: right; }
      tbody td::before {
        content: attr(data-label);
        color: var(--muted);
        text-transform: uppercase;
        font-size: 10.5px;
        letter-spacing: 0.08em;
        font-weight: 500;
        flex-shrink: 0;
      }
      tbody td.rank {
        position: absolute;
        top: 14px;
        right: 16px;
        padding: 2px 8px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 11px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        display: inline-block;
        width: auto;
      }
      tbody td.rank::before { content: '#'; margin-right: 1px; }
      tbody td.addr {
        padding: 0 60px 10px 0;
        margin-bottom: 6px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
      }
      tbody td.addr::before { display: none; }
      tbody td.addr a { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Wallet <em>Spotter</em></h1>
      <nav class="nav">
        <a href="/">Token scanner</a>
        <a href="/history.html" class="active">History</a>
        <a href="/leaderboard.html">Leaderboard</a>
      </nav>
    </div>
    <div class="sub">Every token you've scanned</div>

    <div id="results"><div class="status">Loading…</div></div>
    <div class="meta" id="meta"></div>
  </div>

  <script>
    const results = document.getElementById('results');
    const meta = document.getElementById('meta');

    const fmtNum = (n) => {
      if (n === null || n === undefined || isNaN(n)) return '—';
      const x = Number(n);
      if (Math.abs(x) >= 1e9) return (x / 1e9).toFixed(2) + 'B';
      if (Math.abs(x) >= 1e6) return (x / 1e6).toFixed(2) + 'M';
      if (Math.abs(x) >= 1e3) return (x / 1e3).toFixed(2) + 'K';
      return x.toFixed(2);
    };
    const fmtUsd = (n) => '$' + fmtNum(n);
    const shortAddr = (a) => (a ? a.slice(0, 4) + '…' + a.slice(-4) : '');
    const fmtDate = (ts) => {
      if (!ts) return '—';
      const d = new Date(ts);
      return d.toLocaleString(undefined, { year: 'numeric', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    };

    (async () => {
      try {
        const r = await fetch('/api/history');
        const data = await r.json();
        if (!r.ok || data.error) {
          results.innerHTML = '<div class="error">' + (data.error || 'Request failed') + '</div>';
          return;
        }
        const tokens = data.tokens || [];
        if (!tokens.length) {
          results.innerHTML = '<div class="status">No tokens scanned yet. Run a lookup on the token scanner page first.</div>';
          return;
        }
        const rows = tokens.map((t, i) => {
          const pnl = Number(t.totalPnl) || 0;
          const pnlClass = pnl >= 0 ? 'buy' : 'sell';
          const pnlSign = pnl >= 0 ? '+' : '-';
          return `
            <tr>
              <td class="rank">${i + 1}</td>
              <td class="addr"><a href="https://solscan.io/token/${t.address}" target="_blank" rel="noopener">${shortAddr(t.address)}</a></td>
              <td class="num" data-label="Scanned">${fmtDate(t.scannedAt)}</td>
              <td class="num" data-label="Traders">${t.traderCount || 0}</td>
              <td class="num" data-label="Avg Entry MC">${t.avgEntryMcap ? fmtUsd(t.avgEntryMcap) : '—'}</td>
              <td class="num" data-label="Avg Exit MC">${t.avgExitMcap ? fmtUsd(t.avgExitMcap) : '—'}</td>
              <td class="num ${pnlClass}" data-label="Total PNL">${pnlSign}${fmtUsd(Math.abs(pnl))}</td>
            </tr>`;
        }).join('');
        results.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>#</th><th>Token</th>
                <th style="text-align:right">Scanned</th>
                <th style="text-align:right">Traders</th>
                <th style="text-align:right">Avg Entry MC</th>
                <th style="text-align:right">Avg Exit MC</th>
                <th style="text-align:right">Total PNL</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
        meta.textContent = `${tokens.length} token${tokens.length === 1 ? '' : 's'} scanned · most recent first`;
      } catch (err) {
        results.innerHTML = '<div class="error">' + String(err) + '</div>';
      }
    })();
  </script>
</body>
</html>
