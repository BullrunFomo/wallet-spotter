<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Wallet Spotter — Scan History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #121212;
      --panel: #1A1A1A;
      --panel-2: #0A0A0A;
      --border: #262626;
      --text: #F5F5F5;
      --muted: #8A8A8A;
      --accent: #D97757;
      --accent-hover: #C96846;
      --buy: #8FB573;
      --sell: #D77B6D;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: 'Söhne', ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 48px 20px 120px;
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: -0.005em;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 6px;
    }
    h1 {
      margin: 0;
      font-family: 'Tiempos Headline', 'Copernicus', ui-serif, Georgia, serif;
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -0.025em;
      color: var(--text);
    }
    h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
    .sub { color: var(--muted); margin-bottom: 28px; font-size: 14px; }
    .nav { display: flex; gap: 22px; font-size: 13px; flex-shrink: 0; }
    .nav a { color: var(--muted); text-decoration: none; padding-bottom: 4px; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
    .nav a:hover { color: var(--text); }
    .nav a.active { color: var(--accent); border-bottom-color: var(--accent); }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 13.5px;
    }
    th {
      background: var(--panel-2);
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    tbody tr { transition: background-color 0.12s ease; }
    tbody tr:hover { background: rgba(217, 119, 87, 0.04); }
    tr:last-child td { border-bottom: none; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .addr { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 12.5px; }
    .addr a { color: var(--accent); text-decoration: none; }
    .addr a:hover { text-decoration: underline; }
    .copy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      width: 20px;
      height: 20px;
      margin-left: 6px;
      padding: 0;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s ease, transform 0.1s ease;
    }
    .copy-btn:hover { color: var(--text); }
    .copy-btn:active { transform: scale(0.94); }
    .copy-btn.copied { color: var(--buy); }
    .copy-btn svg { width: 12px; height: 12px; pointer-events: none; }
    .buy { color: var(--buy); }
    .sell { color: var(--sell); }
    .status { color: var(--muted); padding: 24px; text-align: center; font-size: 14px; }
    .error { color: var(--sell); background: rgba(215, 123, 109, 0.08); border: 1px solid rgba(215, 123, 109, 0.3); padding: 14px 16px; border-radius: 10px; font-size: 14px; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 12px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
    }
    .stat .label {
      color: var(--muted);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.08em;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .stat .value {
      font-family: 'Tiempos Headline', 'Copernicus', ui-serif, Georgia, serif;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }
    @media (max-width: 720px) {
      body { padding: 24px 16px 80px; font-size: 14px; }
      .header { flex-direction: column; align-items: flex-start; gap: 14px; margin-bottom: 4px; }
      h1 { font-size: 30px; }
      .sub { margin-bottom: 20px; font-size: 13px; }
      .nav { gap: 18px; font-size: 13px; width: 100%; }

      #results { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 14px; }
      table { border-radius: 0; }
      th, td { padding: 8px 10px; font-size: 12px; }
      th { font-size: 10px; letter-spacing: 0.06em; white-space: nowrap; }
      td { white-space: nowrap; }
      .addr { font-size: 11.5px; }
      .copy-btn { width: 18px; height: 18px; margin-left: 4px; }
      .copy-btn svg { width: 11px; height: 11px; }
      .stats { grid-template-columns: 1fr; gap: 10px; margin-bottom: 16px; }
      .stat { padding: 14px 16px; }
      .stat .value { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Wallet <em>Spotter</em></h1>
      <nav class="nav">
        <a href="/">Token scanner</a>
        <a href="/history.html" class="active">History</a>
        <a href="/leaderboard.html">Leaderboard</a>
      </nav>
    </div>
    <div class="sub">Every token you've scanned</div>

    <div class="stats" id="stats" hidden></div>
    <div id="results"><div class="status">Loading…</div></div>
    <div class="meta" id="meta"></div>
  </div>

  <script>
    const results = document.getElementById('results');
    const meta = document.getElementById('meta');
    const stats = document.getElementById('stats');

    const fmtNum = (n) => {
      if (n === null || n === undefined || isNaN(n)) return '—';
      const x = Number(n);
      if (Math.abs(x) >= 1e9) return (x / 1e9).toFixed(2) + 'B';
      if (Math.abs(x) >= 1e6) return (x / 1e6).toFixed(2) + 'M';
      if (Math.abs(x) >= 1e3) return (x / 1e3).toFixed(2) + 'K';
      return x.toFixed(2);
    };
    const fmtUsd = (n) => '$' + fmtNum(n);
    const shortAddr = (a) => (a ? a.slice(0, 4) + '…' + a.slice(-4) : '');
    const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    const COPY_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
    const CHECK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"></polyline></svg>';
    const copyBtn = (addr) => `<button type="button" class="copy-btn" data-copy="${addr}" title="Copy address" aria-label="Copy address">${COPY_ICON}</button>`;
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.copy-btn');
      if (!btn) return;
      e.preventDefault();
      const addr = btn.getAttribute('data-copy');
      if (!addr) return;
      navigator.clipboard.writeText(addr).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = CHECK_ICON;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = COPY_ICON;
        }, 1200);
      }).catch(() => {});
    });

    (async () => {
      try {
        const r = await fetch('/api/history');
        const data = await r.json();
        if (!r.ok || data.error) {
          results.innerHTML = '<div class="error">' + (data.error || 'Request failed') + '</div>';
          return;
        }
        const tokens = data.tokens || [];
        if (!tokens.length) {
          results.innerHTML = '<div class="status">No tokens scanned yet. Run a lookup on the token scanner page first.</div>';
          return;
        }
        const rows = tokens.map((t, i) => {
          const pnl = Number(t.totalPnl) || 0;
          const pnlClass = pnl >= 0 ? 'buy' : 'sell';
          const pnlSign = pnl >= 0 ? '+' : '-';
          const ticker = t.ticker ? escapeHtml(t.ticker) : '—';
          return `
            <tr>
              <td class="rank">${i + 1}</td>
              <td class="addr"><a href="https://solscan.io/token/${t.address}" target="_blank" rel="noopener">${shortAddr(t.address)}</a>${copyBtn(t.address)}</td>
              <td class="num" data-label="Ticker">${ticker}</td>
              <td class="num" data-label="Traders">${t.traderCount || 0}</td>
              <td class="num" data-label="Avg Entry MC">${t.avgEntryMcap ? fmtUsd(t.avgEntryMcap) : '—'}</td>
              <td class="num" data-label="Avg Exit MC">${t.avgExitMcap ? fmtUsd(t.avgExitMcap) : '—'}</td>
              <td class="num ${pnlClass}" data-label="Total PNL">${pnlSign}${fmtUsd(Math.abs(pnl))}</td>
            </tr>`;
        }).join('');
        results.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>#</th><th>Token</th>
                <th style="text-align:right">Ticker</th>
                <th style="text-align:right">Traders</th>
                <th style="text-align:right">Avg Entry MC</th>
                <th style="text-align:right">Avg Exit MC</th>
                <th style="text-align:right">Total PNL</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
        meta.textContent = `${tokens.length} token${tokens.length === 1 ? '' : 's'} scanned · most recent first`;

        const trackedTraders = tokens.reduce((a, t) => a + (Number(t.traderCount) || 0), 0);
        const avgPnl = tokens.length ? tokens.reduce((a, t) => a + (Number(t.totalPnl) || 0), 0) / tokens.length : 0;
        const avgPnlClass = avgPnl >= 0 ? 'buy' : 'sell';
        const avgPnlSign = avgPnl >= 0 ? '+' : '-';
        stats.hidden = false;
        stats.innerHTML = `
          <div class="stat">
            <div class="label">Scanned tokens</div>
            <div class="value">${tokens.length}</div>
          </div>
          <div class="stat">
            <div class="label">Tracked traders</div>
            <div class="value">${trackedTraders}</div>
          </div>
          <div class="stat">
            <div class="label">Average PNL</div>
            <div class="value ${avgPnlClass}">${avgPnlSign}${fmtUsd(Math.abs(avgPnl))}</div>
          </div>`;
      } catch (err) {
        results.innerHTML = '<div class="error">' + String(err) + '</div>';
      }
    })();
  </script>
</body>
</html>
