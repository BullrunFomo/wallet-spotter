<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Wallet Spotter — Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #121212;
      --panel: #1A1A1A;
      --panel-2: #0A0A0A;
      --border: #262626;
      --text: #F5F5F5;
      --muted: #8A8A8A;
      --accent: #D97757;
      --accent-hover: #C96846;
      --buy: #8FB573;
      --sell: #D77B6D;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: 'Söhne', ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 48px 20px 120px;
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: -0.005em;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 6px;
    }
    h1 {
      margin: 0;
      font-family: 'Tiempos Headline', 'Copernicus', ui-serif, Georgia, serif;
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -0.025em;
      color: var(--text);
    }
    h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
    .sub { color: var(--muted); margin-bottom: 28px; font-size: 14px; word-break: break-all; }
    .sub a { color: var(--accent); text-decoration: none; }
    .sub a:hover { text-decoration: underline; }
    .nav { display: flex; gap: 22px; font-size: 13px; flex-shrink: 0; }
    .nav a { color: var(--muted); text-decoration: none; padding-bottom: 4px; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
    .nav a:hover { color: var(--text); }
    .nav a.active { color: var(--accent); border-bottom-color: var(--accent); }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 13.5px;
    }
    th {
      background: var(--panel-2);
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    tbody tr { transition: background-color 0.12s ease; }
    tbody tr:hover { background: rgba(217, 119, 87, 0.04); }
    tr:last-child td { border-bottom: none; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .addr { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 12.5px; }
    .addr a { color: var(--accent); text-decoration: none; }
    .addr a:hover { text-decoration: underline; }
    .buy { color: var(--buy); }
    .sell { color: var(--sell); }
    .status { color: var(--muted); padding: 24px; text-align: center; font-size: 14px; }
    .error { color: var(--sell); background: rgba(215, 123, 109, 0.08); border: 1px solid rgba(215, 123, 109, 0.3); padding: 14px 16px; border-radius: 10px; font-size: 14px; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 12px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
    }
    .stat .label {
      color: var(--muted);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.08em;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .stat .value {
      font-family: 'Tiempos Headline', 'Copernicus', ui-serif, Georgia, serif;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }
    @media (max-width: 720px) {
      body { padding: 24px 16px 80px; font-size: 14px; }
      .header { flex-direction: column; align-items: flex-start; gap: 14px; margin-bottom: 4px; }
      h1 { font-size: 30px; }
      .sub { margin-bottom: 20px; font-size: 13px; }
      .nav { gap: 18px; font-size: 13px; width: 100%; }

      table, thead, tbody, tr, td { display: block; width: 100%; }
      table { background: transparent; border: none; border-radius: 0; overflow: visible; }
      thead { position: absolute; left: -9999px; }
      tbody tr {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 10px;
        position: relative;
      }
      tbody tr:hover { background: var(--panel); }
      tbody td {
        border: none;
        padding: 5px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        font-size: 13.5px;
      }
      tbody td.num { text-align: right; }
      tbody td::before {
        content: attr(data-label);
        color: var(--muted);
        text-transform: uppercase;
        font-size: 10.5px;
        letter-spacing: 0.08em;
        font-weight: 500;
        flex-shrink: 0;
      }
      tbody td.addr {
        padding: 0 0 10px 0;
        margin-bottom: 6px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
      }
      tbody td.addr::before { display: none; }
      tbody td.addr a { font-size: 14px; }
      .stats { grid-template-columns: 1fr; gap: 10px; margin-bottom: 16px; }
      .stat { padding: 14px 16px; }
      .stat .value { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Wallet <em>Spotter</em></h1>
      <nav class="nav">
        <a href="/">Token scanner</a>
        <a href="/history.html">History</a>
        <a href="/leaderboard.html">Leaderboard</a>
      </nav>
    </div>
    <div class="sub" id="walletSub">Loading…</div>

    <div class="stats" id="stats" hidden></div>
    <div id="results"><div class="status">Loading…</div></div>
    <div class="meta" id="meta"></div>
  </div>

  <script>
    const results = document.getElementById('results');
    const meta = document.getElementById('meta');
    const stats = document.getElementById('stats');
    const walletSub = document.getElementById('walletSub');

    const fmtNum = (n) => {
      if (n === null || n === undefined || isNaN(n)) return '—';
      const x = Number(n);
      if (Math.abs(x) >= 1e9) return (x / 1e9).toFixed(2) + 'B';
      if (Math.abs(x) >= 1e6) return (x / 1e6).toFixed(2) + 'M';
      if (Math.abs(x) >= 1e3) return (x / 1e3).toFixed(2) + 'K';
      return x.toFixed(2);
    };
    const fmtUsd = (n) => '$' + fmtNum(n);
    const shortAddr = (a) => (a ? a.slice(0, 4) + '…' + a.slice(-4) : '');
    const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    const params = new URLSearchParams(location.search);
    const address = params.get('address');

    if (!address) {
      walletSub.innerHTML = '<span class="error">No wallet address provided.</span>';
      results.innerHTML = '';
    } else {
      walletSub.innerHTML = `Wallet <a href="https://solscan.io/account/${address}" target="_blank" rel="noopener">${address}</a>`;
      (async () => {
        try {
          const r = await fetch('/api/wallet?address=' + encodeURIComponent(address));
          const data = await r.json();
          if (!r.ok || data.error) {
            results.innerHTML = '<div class="error">' + (data.error || 'Request failed') + '</div>';
            return;
          }
          const trades = data.trades || [];
          if (!trades.length) {
            results.innerHTML = '<div class="status">No trades recorded for this wallet.</div>';
            return;
          }
          const rows = trades.map(t => {
            const pnlClass = t.pnl >= 0 ? 'buy' : 'sell';
            const pnlSign = t.pnl >= 0 ? '+' : '-';
            const ticker = t.ticker ? escapeHtml(t.ticker) : '—';
            return `
              <tr>
                <td class="addr"><a href="https://solscan.io/token/${t.token}" target="_blank" rel="noopener">${shortAddr(t.token)}</a></td>
                <td class="num" data-label="Ticker">${ticker}</td>
                <td class="num" data-label="Buy">${fmtNum(t.volumeBuy)}</td>
                <td class="num" data-label="Sell">${fmtNum(t.volumeSell)}</td>
                <td class="num buy" data-label="Buy $">${fmtUsd(t.volumeBuyUsd)}</td>
                <td class="num sell" data-label="Sell $">${fmtUsd(t.volumeSellUsd)}</td>
                <td class="num" data-label="Entry MC">${t.entryMcap ? fmtUsd(t.entryMcap) : '—'}</td>
                <td class="num" data-label="Exit MC">${t.exitMcap ? fmtUsd(t.exitMcap) : '—'}</td>
                <td class="num" data-label="Multiple">${t.multiple ? t.multiple.toFixed(2) + 'x' : '—'}</td>
                <td class="num ${pnlClass}" data-label="PNL">${pnlSign}${fmtUsd(Math.abs(t.pnl))}</td>
              </tr>`;
          }).join('');
          results.innerHTML = `
            <table>
              <thead>
                <tr>
                  <th>CA</th>
                  <th style="text-align:right">Ticker</th>
                  <th style="text-align:right">Buy</th>
                  <th style="text-align:right">Sell</th>
                  <th style="text-align:right">Buy $</th>
                  <th style="text-align:right">Sell $</th>
                  <th style="text-align:right">Entry MC</th>
                  <th style="text-align:right">Exit MC</th>
                  <th style="text-align:right">Multiple</th>
                  <th style="text-align:right">PNL</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>`;
          meta.textContent = `${trades.length} token${trades.length === 1 ? '' : 's'} traded · sorted by multiple`;

          const multiples = trades.map(t => Number(t.multiple)).filter(m => m > 0);
          const avgMultiple = multiples.length ? multiples.reduce((a, b) => a + b, 0) / multiples.length : 0;
          const totalPnl = trades.reduce((a, t) => a + (Number(t.pnl) || 0), 0);
          const pnlClass = totalPnl >= 0 ? 'buy' : 'sell';
          const pnlSign = totalPnl >= 0 ? '+' : '-';
          stats.hidden = false;
          stats.innerHTML = `
            <div class="stat">
              <div class="label">Tokens traded</div>
              <div class="value">${trades.length}</div>
            </div>
            <div class="stat">
              <div class="label">Average multiple</div>
              <div class="value">${avgMultiple ? avgMultiple.toFixed(2) + 'x' : '—'}</div>
            </div>
            <div class="stat">
              <div class="label">Overall PNL</div>
              <div class="value ${pnlClass}">${pnlSign}${fmtUsd(Math.abs(totalPnl))}</div>
            </div>`;
        } catch (err) {
          results.innerHTML = '<div class="error">' + String(err) + '</div>';
        }
      })();
    }
  </script>
</body>
</html>
