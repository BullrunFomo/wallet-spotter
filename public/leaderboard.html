<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Wallet Spotter — Leaderboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #121212;
      --panel: #1A1A1A;
      --panel-2: #0A0A0A;
      --border: #262626;
      --text: #F5F5F5;
      --muted: #8A8A8A;
      --accent: #D97757;
      --accent-hover: #C96846;
      --buy: #8FB573;
      --sell: #D77B6D;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: 'Söhne', ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 48px 20px 120px;
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: -0.005em;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 6px;
    }
    h1 {
      margin: 0;
      font-family: 'Tiempos Headline', 'Copernicus', ui-serif, Georgia, serif;
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -0.025em;
      color: var(--text);
    }
    h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
    .sub { color: var(--muted); margin-bottom: 28px; font-size: 14px; }
    .nav { display: flex; gap: 22px; font-size: 13px; flex-shrink: 0; }
    .nav a { color: var(--muted); text-decoration: none; padding-bottom: 4px; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
    .nav a:hover { color: var(--text); }
    .nav a.active { color: var(--accent); border-bottom-color: var(--accent); }
    @media (max-width: 600px) {
      .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 13.5px;
    }
    th {
      background: var(--panel-2);
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    tbody tr { transition: background-color 0.12s ease; }
    tbody tr:hover { background: rgba(217, 119, 87, 0.04); }
    tr:last-child td { border-bottom: none; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .wallet { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 12.5px; }
    .wallet a { color: var(--accent); text-decoration: none; }
    .wallet a:hover { text-decoration: underline; }
    .buy { color: var(--buy); }
    .sell { color: var(--sell); }
    .status { color: var(--muted); padding: 24px; text-align: center; font-size: 14px; }
    .error { color: var(--sell); background: rgba(215, 123, 109, 0.08); border: 1px solid rgba(215, 123, 109, 0.3); padding: 14px 16px; border-radius: 10px; font-size: 14px; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Wallet <em>Spotter</em></h1>
      <nav class="nav">
        <a href="/">Token scanner</a>
        <a href="/leaderboard.html" class="active">Leaderboard</a>
      </nav>
    </div>
    <div class="sub">All-time top traders across every token you've scanned</div>

    <div id="results"><div class="status">Loading…</div></div>
    <div class="meta" id="meta"></div>
  </div>

  <script>
    const results = document.getElementById('results');
    const meta = document.getElementById('meta');

    const fmtNum = (n) => {
      if (n === null || n === undefined || isNaN(n)) return '—';
      const x = Number(n);
      if (Math.abs(x) >= 1e9) return (x / 1e9).toFixed(2) + 'B';
      if (Math.abs(x) >= 1e6) return (x / 1e6).toFixed(2) + 'M';
      if (Math.abs(x) >= 1e3) return (x / 1e3).toFixed(2) + 'K';
      return x.toFixed(2);
    };
    const fmtUsd = (n) => '$' + fmtNum(n);
    const shortAddr = (a) => (a ? a.slice(0, 4) + '…' + a.slice(-4) : '');

    (async () => {
      try {
        const r = await fetch('/api/leaderboard');
        const data = await r.json();
        if (!r.ok || data.error) {
          results.innerHTML = '<div class="error">' + (data.error || 'Request failed') + '</div>';
          return;
        }
        const wallets = data.wallets || [];
        if (!wallets.length) {
          results.innerHTML = '<div class="status">No traders scanned yet. Run a lookup on the token scanner page first.</div>';
          return;
        }
        const rows = wallets.map((w, i) => {
          const pnlClass = w.pnl >= 0 ? 'buy' : 'sell';
          const pnlSign = w.pnl >= 0 ? '+' : '-';
          return `
            <tr>
              <td>${i + 1}</td>
              <td class="wallet"><a href="https://solscan.io/account/${w.wallet}" target="_blank" rel="noopener">${shortAddr(w.wallet)}</a></td>
              <td class="num">${w.avgEntryMcap ? fmtUsd(w.avgEntryMcap) : '—'}</td>
              <td class="num">${w.avgExitMcap ? fmtUsd(w.avgExitMcap) : '—'}</td>
              <td class="num">${w.tokens}</td>
              <td class="num">${w.avgMultiple ? w.avgMultiple.toFixed(2) + 'x' : '—'}</td>
              <td class="num ${pnlClass}">${pnlSign}${fmtUsd(Math.abs(w.pnl))}</td>
            </tr>`;
        }).join('');
        results.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>#</th><th>Wallet</th>
                <th style="text-align:right">Avg Entry MC</th>
                <th style="text-align:right">Avg Exit MC</th>
                <th style="text-align:right">Tokens</th>
                <th style="text-align:right">Avg Multiple</th>
                <th style="text-align:right">Overall PNL</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
        meta.textContent = `Showing top ${wallets.length} of ${wallets.length} wallets · sorted by avg multiple`;
      } catch (err) {
        results.innerHTML = '<div class="error">' + String(err) + '</div>';
      }
    })();
  </script>
</body>
</html>
